<script>
/* home-only rendering: signatures, category cards, marquee (localized) */
(function () {
  var SIG_SLUGS = ["lamb-chops", "otantik-kebab", "mix-grill-2-person"];
  var CAT_CARDS = [
    { id: "cold", img: "assets/img/menu/hummus-beirut.jpg" },
    { id: "grill", img: "assets/img/menu/lamb-chops.jpg" },
    { id: "manakish", img: "assets/img/menu/zaatar-pie.jpg" },
    { id: "salads", img: "assets/img/menu/fatoush.jpg" },
    { id: "pasta", img: "assets/img/menu/linguine-shrimp-saffron.jpg" },
    { id: "sweets", img: "assets/img/menu/mix-baklava-350-g.jpg" }
  ];
  var MENU = window.OTANTIK_MENU;

  function renderHome() {
    var L = window.OTANTIK_I18N.lang;
    var t = window.OTANTIK_I18N.t;

    var rows = document.getElementById("sig-rows");
    if (rows && MENU) {
      rows.innerHTML = SIG_SLUGS.map(function (slug, i) {
        var it = MENU.items.filter(function (x) { return x.slug === slug; })[0];
        if (!it) return "";
        return '<div class="sig-row">' +
          '<span class="sig-ghost" aria-hidden="true" data-parallax="16">0' + (i + 1) + '</span>' +
          '<div class="sig-media rv glow"><img src="' + it.img + '" alt="' + it.name[L] + '" loading="lazy" data-fv-cap="' + it.name[L] + '  ·  ¥' + it.price + '"></div>' +
          '<div class="sig-body">' +
            '<div class="num rv">0' + (i + 1) + '</div>' +
            '<h3 class="rv">' + it.name[L] + "</h3>" +
            '<p class="rv">' + it.desc[L] + "</p>" +
            '<div class="rv"><span class="sig-price">¥' + it.price + '</span>' +
            '<a class="sig-link" href="menu.html#' + it.slug + '">' + t("sig.link") + " ↗</a></div>" +
          "</div></div>";
      }).join("");
    }

    var grid = document.getElementById("cat-grid");
    if (grid && MENU) {
      grid.innerHTML = CAT_CARDS.map(function (cc) {
        var c = MENU.categories.filter(function (x) { return x.id === cc.id; })[0];
        var n = MENU.items.filter(function (x) { return x.cat === cc.id; }).length;
        return '<a class="cat-card rv glow" href="menu.html#' + cc.id + '">' +
          '<img src="' + cc.img + '" alt="' + c.name[L] + '" loading="lazy">' +
          '<div class="veil"></div>' +
          '<div class="cc-label"><span class="cc-name">' + c.name[L] + '</span><span class="cc-count">' + n + " " + t("cats.dishes") + "</span></div>" +
        "</a>";
      }).join("");
    }

    var mq = document.getElementById("marquee-track");
    if (mq && MENU) {
      var names = ["lamb-chops", "hummus-beirut", "otantik-kebab", "fatoush", "muhammara", "zaatar-pie", "grilled-salmon", "mix-baklava-350-g", "vine-leaves-with-oil", "toshka"]
        .map(function (s) {
          var it = MENU.items.filter(function (x) { return x.slug === s; })[0];
          return it ? it.name[L] : "";
        }).filter(Boolean);
      var half = names.map(function (n) { return "<span>" + n + "</span>"; }).join("");
      mq.innerHTML = half + half; /* duplicated for seamless loop */
    }

    /* re-run reveal animation binding for newly injected .rv nodes */
    if (window.gsap && !window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
      document.querySelectorAll("#sig-rows .rv, #cat-grid.rv, #cat-grid .rv").forEach(function (el) {
        gsap.fromTo(el, { opacity: 0, y: 34 }, {
          opacity: 1, y: 0, duration: 1.05, ease: "power3.out",
          scrollTrigger: { trigger: el, start: "top 90%", once: true }
        });
      });
      if (window.ScrollTrigger) ScrollTrigger.refresh();
    } else {
      document.querySelectorAll("#sig-rows .rv, #cat-grid .rv").forEach(function (el) {
        el.style.opacity = 1; el.style.transform = "none";
      });
    }
    if (window.OTANTIK_BIND_MOTION) window.OTANTIK_BIND_MOTION(document.getElementById("sig-rows"));
  }

  document.addEventListener("otantik:lang", renderHome);
  document.addEventListener("DOMContentLoaded", renderHome);

  /* tap a signature dish photo → full-screen view */
  document.addEventListener("click", function (e) {
    var img = e.target.closest(".sig-media img");
    if (img && window.OTANTIK_FULLVIEW) {
      window.OTANTIK_FULLVIEW(img.getAttribute("src"), img.getAttribute("data-fv-cap") || "");
    }
  });
})();
</script>
